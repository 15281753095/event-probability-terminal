name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck TypeScript
        run: pnpm typecheck

      - name: Build TypeScript and web packages
        run: pnpm build

      - name: Test JavaScript packages
        run: pnpm test:js

      - name: Install Playwright browser
        run: pnpm --filter @ept/web exec playwright install --with-deps chromium

      - name: Smoke test web pages
        run: pnpm test:smoke

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Test Python services
        run: python -m pytest services/pricing-engine/tests

      - name: Lint Python services
        run: |
          python -m ruff check services/pricing-engine
          python -m mypy services/pricing-engine/src
